<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Video with Questions - EduPath</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/core/shared.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/notification.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/mobile-menu.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/password-handler.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/form-validator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pages/teacher/upload-video-with-quiz.js') }}"></script>
</head>
<body>
  <div class="container">
    <h1>Upload Video with Interactive Questions</h1>
    
    <form method="POST" enctype="multipart/form-data" id="videoForm">
      <input type="hidden" name="type" value="video_with_quiz">
      
      <div class="form-group">
        <label>Select Course</label>
        <select name="course_id" required>
          {% for course in courses %}
          <option value="{{ course.id }}">{{ course.name }}</option>
          {% endfor %}
        </select>
      </div>
      
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" name="title" required>
      </div>
      
      <div class="form-group">
        <label>Upload Video</label>
        <input type="file" name="video" accept="video/mp4" required>
      </div>
      
      <h3>Add Questions to Video</h3>
      <div id="questions-container">
        <!-- Questions will be added here -->
      </div>
      
      <button type="button" onclick="addQuestionField()" class="btn-secondary">
        + Add Question at Timestamp
      </button>
      
      <button type="submit" class="btn-primary">Upload Video with Questions</button>
    </form>
  </div>


</body>
</html>
