<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Content - EduPath</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="{{ url_for('static', filename='js/core/shared.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/notification.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/mobile-menu.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/password-handler.js') }}"></script>
  <script src="{{ url_for('static', filename='js/core/form-validator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pages/teacher/upload-content.js') }}"></script>

</head>
<body>
  <header class="navbar">
    <nav class="container">
      <a href="{{ url_for('index') }}" class="logo">
        <i class="bi bi-book"></i> EduPath
      </a>
      <ul class="nav-links">
        <li><a href="{{ url_for('teacher_dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('teacher_dashboard') }}">My Courses</a></li>
        <li><a href="{{ url_for('upload_content') }}" class="active">Upload</a></li>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
      <button class="mobile-toggle" onclick="toggleMenu()">☰</button>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="section-title">Upload Course Content</h1>
        <p class="section-subtitle">Upload videos, documents, quizzes, and assessments</p>

        <!-- Content Type Tabs -->
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center;">
          <button class="btn-primary" style="width: auto;" onclick="showTab('video')">
            <i class="bi bi-camera-reel"></i> Video
          </button>
          <button class="btn-primary" style="width: auto;" onclick="showTab('document')">
            <i class="bi bi-file-text"></i> Document
          </button>
          <button class="btn-primary" style="width: auto;" onclick="showTab('quiz')">
            <i class="bi bi-pencil"></i> Quiz
          </button>
          <button class="btn-primary" style="width: auto;" onclick="showTab('assessment')">
            <i class="bi bi-bar-chart"></i> Assessment
          </button>
        </div>

        <!-- Video/Document Upload Form -->
        <div id="video-tab" class="form-card" style="display: none;">
          <h3 style="margin-bottom: 1rem;">Upload Video/Document</h3>
          <form action="{{ url_for('upload_content') }}" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="type" id="upload-type">
            
            <div class="form-group">
              <label for="course_id">Select Course</label>
              <select id="course_id" name="course_id" required>
                <option value="">Choose a course</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="form-group">
              <label for="title">Content Title</label>
              <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
              <label for="file">Select File</label>
              <input type="file" id="file" name="file" required>
              <small class="text-muted">Supported: MP4, PDF, DOC, PPT (Max 100MB)</small>
            </div>
            
            <button type="submit" class="btn-primary">
              <i class="bi bi-cloud-upload"></i> Upload
            </button>
          </form>
        </div>

        <!-- Quiz Creation Form -->
        <div id="quiz-tab" class="form-card" style="display: none;">
          <h3 style="margin-bottom: 1rem;">Create Quiz</h3>
          <form action="{{ url_for('create_quiz') }}" method="POST">
            <div class="form-group">
              <label for="quiz_course">Select Course</label>
              <select id="quiz_course" name="course_id" required>
                <option value="">Choose a course</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="form-group">
              <label for="quiz_title">Quiz Title</label>
              <input type="text" id="quiz_title" name="title" required>
            </div>
            
            <div class="form-group">
              <label for="description">Description</label>
              <textarea id="description" name="description" rows="3"></textarea>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="time_limit">Time Limit (minutes)</label>
                <input type="number" id="time_limit" name="time_limit" min="5" max="180" value="30">
              </div>
              <div class="form-group">
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date">
              </div>
            </div>

            <!-- Questions will be added via JavaScript -->
            <div id="questions-container">
              <h4 style="margin: 1rem 0;">Questions</h4>
            </div>
            
            <button type="button" class="btn-secondary" onclick="addQuestion()" style="margin-bottom: 1rem;">
              <i class="bi bi-plus-circle"></i> Add Question
            </button>
            
            <button type="submit" class="btn-primary">
              <i class="bi bi-save"></i> Save Quiz
            </button>
          </form>
        </div>

        <!-- Assessment Upload Form -->
        <div id="assessment-tab" class="form-card" style="display: none;">
          <h3 style="margin-bottom: 1rem;">Upload Assessment/Grade Book</h3>
          <form action="{{ url_for('upload_content') }}" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="type" value="assessment">
            
            <div class="form-group">
              <label for="assessment_course">Select Course</label>
              <select id="assessment_course" name="course_id" required>
                <option value="">Choose a course</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
              </select>
            </div>
            
            <div class="form-group">
              <label for="assessment_title">Assessment Title</label>
              <input type="text" id="assessment_title" name="title" required>
            </div>
            
            <div class="form-group">
              <label for="assessment_file">Upload File (PDF/Excel)</label>
              <input type="file" id="assessment_file" name="file" accept=".pdf,.xlsx,.xls" required>
            </div>
            
            <div class="form-group">
              <label for="gradebook">Upload Grade Book (Optional)</label>
              <input type="file" id="gradebook" name="gradebook" accept=".xlsx,.xls">
            </div>
            
            <button type="submit" class="btn-primary">
              <i class="bi bi-cloud-upload"></i> Upload
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
