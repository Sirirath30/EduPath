<!DOCTYPE html>
<html>
<head>
    <title>{{ material.title }} - EduPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student/watch_video.css') }}" />  
    <script src="{{ url_for('static', filename='js/core/shared.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notification.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/mobile-menu.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/password-handler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/form-validator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/student/watch-video.js') }}"></script>
    

</head>
<body>
    <div class="video-container">
        <h1>{{ material.title }}</h1>
        
        <video id="videoPlayer" controls controlsList="nodownload">
            <source src="{{ url_for('static', filename='uploads/' + material.file_path) }}" type="video/mp4">
        </video>
        
        <div class="video-controls">
            <button onclick="markCompleted()" class="btn-primary">Mark as Completed</button>
        </div>
    </div>

    <!-- Question Modal -->
    <div id="questionModal" class="question-modal hidden">
        <div class="question-box">
            <h3 id="questionText"></h3>
            <div id="optionsContainer"></div>
            <button id="submitAnswer" class="btn-primary" style="margin-top: 20px;" onclick="submitAnswer()">Submit</button>
        </div>
    </div>


</body>
</html>
